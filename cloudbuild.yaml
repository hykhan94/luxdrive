# ============================================
# Cloud Build config for LuxDrive Frontend
# ============================================
# Usage from repo root:
#   gcloud builds submit --region=me-central2 --config=cloudbuild.yaml --timeout=20m .
#
# This builds the Next.js frontend Docker image and pushes it to
# Artifact Registry in me-central2 (Dammam).
# ============================================

steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "--build-arg"
      - "NEXT_PUBLIC_API_URL=https://api.luxdriveksa.com"
      - "-t"
      - "me-central2-docker.pkg.dev/cryptic-bolt-495416-i5/luxdrive/web:latest"
      - "."

images:
  - "me-central2-docker.pkg.dev/cryptic-bolt-495416-i5/luxdrive/web:latest"

options:
  machineType: "E2_HIGHCPU_8"
